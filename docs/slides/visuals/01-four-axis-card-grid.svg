<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">NanoPitch four-axis feedback card grid</title>
  <desc id="desc">A two by two grid showing pitch, tempo, dynamics, and technique feedback cards.</desc>
  <rect width="1600" height="900" fill="#f7f5ef"/>
  <text x="110" y="110" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" fill="#151515">Four Feedback Axes</text>
  <text x="110" y="160" font-family="Inter, Arial, sans-serif" font-size="25" fill="#605f5a">One recorded take becomes four objective feedback cards.</text>

  <g transform="translate(110 235)">
    <rect width="640" height="245" rx="18" fill="#ffffff" stroke="#d8d3c8" stroke-width="3"/>
    <rect width="11" height="245" rx="5.5" fill="#257d6b"/>
    <circle cx="85" cy="72" r="30" fill="#e6f3ef"/>
    <path d="M70 72 C80 40 95 104 108 72" fill="none" stroke="#257d6b" stroke-width="8" stroke-linecap="round"/>
    <text x="135" y="66" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#151515">Pitch</text>
    <text x="135" y="105" font-family="Inter, Arial, sans-serif" font-size="22" fill="#605f5a">median note, f0, voiced %, stability</text>
    <g font-family="Inter, Arial, sans-serif" font-size="26" fill="#151515">
      <text x="70" y="172">Median note</text>
      <text x="405" y="172" font-weight="800">A4</text>
      <text x="70" y="213">Voiced</text>
      <text x="405" y="213" font-weight="800">84%</text>
    </g>
  </g>

  <g transform="translate(850 235)">
    <rect width="640" height="245" rx="18" fill="#ffffff" stroke="#d8d3c8" stroke-width="3"/>
    <rect width="11" height="245" rx="5.5" fill="#d36a3d"/>
    <circle cx="85" cy="72" r="30" fill="#faeee8"/>
    <path d="M70 91 L70 53 M85 91 L85 42 M100 91 L100 62" stroke="#d36a3d" stroke-width="8" stroke-linecap="round"/>
    <text x="135" y="66" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#151515">Tempo</text>
    <text x="135" y="105" font-family="Inter, Arial, sans-serif" font-size="22" fill="#605f5a">onsets, BPM estimate, spacing consistency</text>
    <g font-family="Inter, Arial, sans-serif" font-size="26" fill="#151515">
      <text x="70" y="172">Estimated BPM</text>
      <text x="405" y="172" font-weight="800">120</text>
      <text x="70" y="213">Onsets</text>
      <text x="405" y="213" font-weight="800">clear</text>
    </g>
  </g>

  <g transform="translate(110 545)">
    <rect width="640" height="245" rx="18" fill="#ffffff" stroke="#d8d3c8" stroke-width="3"/>
    <rect width="11" height="245" rx="5.5" fill="#7157a8"/>
    <circle cx="85" cy="72" r="30" fill="#eeeafa"/>
    <path d="M62 86 C82 42 102 42 122 86" fill="none" stroke="#7157a8" stroke-width="8" stroke-linecap="round"/>
    <text x="135" y="66" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#151515">Dynamics</text>
    <text x="135" y="105" font-family="Inter, Arial, sans-serif" font-size="22" fill="#605f5a">loudness contour and range used</text>
    <g font-family="Inter, Arial, sans-serif" font-size="26" fill="#151515">
      <text x="70" y="172">Average dBFS</text>
      <text x="405" y="172" font-weight="800">-31</text>
      <text x="70" y="213">Range used</text>
      <text x="405" y="213" font-weight="800">13.8 dB</text>
    </g>
  </g>

  <g transform="translate(850 545)">
    <rect width="640" height="245" rx="18" fill="#ffffff" stroke="#d8d3c8" stroke-width="3"/>
    <rect width="11" height="245" rx="5.5" fill="#b83b4b"/>
    <circle cx="85" cy="72" r="30" fill="#fae8eb"/>
    <path d="M68 72 C76 55 89 55 97 72 C105 89 115 89 122 72" fill="none" stroke="#b83b4b" stroke-width="8" stroke-linecap="round"/>
    <text x="135" y="66" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#151515">Technique</text>
    <text x="135" y="105" font-family="Inter, Arial, sans-serif" font-size="22" fill="#605f5a">family, confidence, frame-level scores</text>
    <g font-family="Inter, Arial, sans-serif" font-size="26" fill="#151515">
      <text x="70" y="172">Detected family</text>
      <text x="405" y="172" font-weight="800">model output</text>
      <text x="70" y="213">Confidence</text>
      <text x="405" y="213" font-weight="800">reported</text>
    </g>
  </g>
</svg>
