name: Technique Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feature/technique-axis

jobs:
  technique-check-light:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check whitespace
        run: git diff --check

      - name: Run light technique checks
        run: make technique-check-light TECHNIQUE_PYTHON=python3
